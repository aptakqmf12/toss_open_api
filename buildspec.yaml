version: 0.2
phases:
  install:
    # AL2023 표준 이미지(aws/codebuild/amazonlinux-x86_64-standard:5.0)의
    # 런타임 매니저로 Node 20 선택. (Next 16 은 Node 20.9+ 필요)
    runtime-versions:
      nodejs: 20
  build:
    commands:
      - node --version
      - npm ci
      - npm run build
artifacts:
  files:
    - '**/*'
  exclude-paths:
    - .git/**
